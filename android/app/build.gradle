plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.diplomka"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.diplomka"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 26
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
            // Enable R8 with our keep-rules. Required for flutter_local_notifications
            // to load scheduled notifications via Gson reflection at startup —
            // R8 otherwise strips the Signature attribute from TypeToken anon classes.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}

// home_widget 0.8.1 pins androidx.glance:glance-appwidget:1.+, which now resolves to
// 1.3.0-alpha02 and demands compileSdk 37 / AGP 9.1.0 (newer than this Flutter toolchain
// provides). Pin glance to the last stable release compatible with compileSdk 36.
configurations.all {
    resolutionStrategy {
        force 'androidx.glance:glance:1.1.1'
        force 'androidx.glance:glance-appwidget:1.1.1'
    }
}

flutter {
    source = "../.."
}
