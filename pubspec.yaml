name: diplomka
description: "Andras thesis"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: 1.0.8
  flutter_riverpod: 2.6.1
  riverpod_annotation: 2.6.1
  floor: 1.5.0
  sqflite: 2.4.2
  analyzer: 6.4.1
  flutter_lints: 6.0.0
  floor_generator: 1.5.0
  image_picker: 1.2.0
  permission_handler: 12.0.1
  dio: 4.0.6
  easy_localization: 3.0.8
  html_character_entities: 1.0.0+1
  intl: 0.20.2
  dotted_border: 2.1.0
  dashed_circular_progress_bar: 0.0.6
  camera: 0.11.3
  record: 6.2.0
  speech_to_text: 7.2.0
  path_provider: 2.1.5
  json_serializable: 6.8.0
  json_annotation: 4.9.0
  get: 4.6.6
  shared_preferences: 2.0.15
  flutter_localized_locales: 2.0.5
  connectivity_plus: 3.0.6
  flutter_platform_widgets: 6.0.2
  flutter_dotenv: 5.2.0
  mobile_scanner: 5.2.3
  package_info_plus: 8.3.1
  share_plus: 12.0.1
  home_widget: 0.8.1
  flutter_local_notifications: 17.2.4
  timezone: 0.9.4
  flutter_native_timezone: 2.0.0
  liquid_glass_easy: 1.1.1
  pdf: 3.11.1
  csv: 6.0.0
  image_gallery_saver: 2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner:
  custom_lint:
  riverpod_lint: 2.3.10
  riverpod_generator: 2.3.11

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - .env

  fonts:
    - family: Ubuntu
      fonts:
        - asset: assets/fonts/Ubuntu-Regular.ttf
          weight: 400
        - asset: assets/fonts/Ubuntu-Medium.ttf
          weight: 500
        - asset: assets/fonts/Ubuntu-Bold.ttf
          weight: 700
        - asset: assets/fonts/Ubuntu-Light.ttf
          weight: 300
